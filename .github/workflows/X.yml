name: NBS Offline Build

on:
  push:
    branches: [ main, ana ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'

    - name: Install Dependencies
      run: npm install --legacy-peer-deps

    - name: Run Build Script
      run: |
        if [ -f "test.sh" ]; then
          chmod +x test.sh
          ./test.sh
        else
          npm run build
        fi
 
