name: Android APK Build

on:
  push:
    branches: [ main, ana ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Kodları Çek
      uses: actions/checkout@v4

    - name: Node.js Kur
      uses: actions/setup-node@v4
      with:
        node-version: 18

    - name: Bağımlılıkları Yükle
      run: |
        npm install
        npm run build --if-present

    - name: Java Kur
      uses: actions/setup-java@v4
      with:
        distribution: 'zulu'
        java-version: '17'

    - name: Android SDK Ayarla
      uses: android-actions/setup-android@v3

    - name: APK Derleme
      run: |
        if [ -d "android" ]; then
          cd android && ./gradlew assembleDebug
        else
          npx cap add android || npx cordova platform add android
          npx cap sync || npx cordova prepare
          cd android && ./gradlew assembleDebug
        fi

    - name: Hazır APK'yı Dışarı Aktar
      uses: actions/upload-artifact@v4
      with:
        name: FFxPBrawl-APK
        path: android/app/build/outputs/apk/debug/app-debug.apk

